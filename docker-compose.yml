version: '3.8'

networks:
  smf-network:
    driver: bridge

services:
  pdu-session:
    build:
      context: .
      dockerfile: pdu-session/Dockerfile
    environment:
      - HOST=0.0.0.0
      - PORT=8081
      - LOGLEVEL=DEBUG
      - INSTANCE_ID=pdu-session-node
      - GW_PORT=8080
    networks:
      - smf-network

